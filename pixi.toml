[workspace]
authors = ["Payman Tohidifar <payman.tohidifar@gmail.com>"]
channels = ["pytorch", "conda-forge"]
name = "dlsc"
platforms = ["linux-64", "osx-arm64", "win-64"]
version = "0.1.0"

[environments]
# This creates a single environment containing EVERY feature defined below
default = { features = ["base", "ml", "dl"], no-default-feature = true }

[feature.base.dependencies]
python = "3.11.*"
numpy = "*"
pandas = "*"
matplotlib = "*"
seaborn = "*"
jupyterlab = "*"
pixi-kernel = "*"

[feature.ml.dependencies]
scipy = "*"
scikit-learn = "*"

[feature.dl.dependencies]
pytorch = "*"
torchvision = "*"
torchaudio = "*"
cpuonly = "*"

[feature.dl.pypi-dependencies]
tensorflow = "*"
tqdm = "*"