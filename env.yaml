name: deep-learning-specialization-coursera
channels:
    - pytorch
    - conda-forge
    - defaults
dependencies:
    - python=3.11
    # Core Math & Data Science
    - numpy
    - pandas
    - scipy
    - matplotlib
    - seaborn
    - scikit-learn
    # PyTorch (CPU version)
    - pytorch
    - torchvision
    - torchaudio
    - cpuonly
    # Notebook & Kernel Tools
    - jupyterlab
    - pixi-kernel
    - pip:
      - tensorflow
      - tqdm